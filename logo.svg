<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#e2e8f0" stroke-width="2" />
  
  <!-- Loop Path -->
  <path d="M 100,20 A 80,80 0 1,1 99.9,20" fill="none" stroke="#3b82f6" stroke-width="8" stroke-linecap="round" stroke-dasharray="10, 5" opacity="0.2" />

  <!-- TDD Phases Dots -->
  <!-- Red: Test -->
  <circle cx="100" cy="20" r="12" fill="#ef4444" />
  <text x="100" y="45" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#ef4444" font-weight="bold">RED</text>

  <!-- Green: Pass -->
  <circle cx="170" cy="140" r="12" fill="#22c55e" />
  <text x="175" y="165" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#22c55e" font-weight="bold">GREEN</text>

  <!-- Blue: Refactor -->
  <circle cx="30" cy="140" r="12" fill="#3b82f6" />
  <text x="25" y="165" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#3b82f6" font-weight="bold">REFACTOR</text>

  <!-- Center Text -->
  <text x="100" y="105" font-family="Arial, sans-serif" font-size="32" text-anchor="middle" fill="#1e293b" font-weight="900">STDD</text>
  <text x="100" y="125" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#64748b" letter-spacing="2">COPILOT</text>

  <!-- Connecting Arrows -->
  <path d="M 115,25 Q 170,50 170,125" fill="none" stroke="#cbd5e1" stroke-width="3" marker-end="url(#arrowhead)" />
  <path d="M 155,150 Q 100,180 45,150" fill="none" stroke="#cbd5e1" stroke-width="3" marker-end="url(#arrowhead)" />
  <path d="M 30,125 Q 30,50 85,25" fill="none" stroke="#cbd5e1" stroke-width="3" marker-end="url(#arrowhead)" />

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#cbd5e1" />
    </marker>
  </defs>
</svg>
