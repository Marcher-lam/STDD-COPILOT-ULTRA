# STDD Copilot AI 引擎注册表
# 定义所有支持的 AI 代码助手及其适配配置
# 由 /stdd:init 读取并生成 stdd/memory/registry.json

# ─── Tier 1: 完整适配（深度集成，全部 Skill 可用）───

claude_code:
  name: "Claude Code"
  vendor: "Anthropic"
  type: "cli"
  enabled: "${CLAUDE_ENABLED:-true}"
  model: "${CLAUDE_MODEL:-claude-sonnet-4-6}"
  max_tokens: 128000
  detection:
    command: "claude --version"
    config_file: ".claude/"
  skills_compatibility: "full"
  notes: "主要开发目标平台，所有 Skill 完全兼容"

cursor:
  name: "Cursor"
  vendor: "Cursor Inc."
  type: "ide"
  enabled: "${CURSOR_ENABLED:-false}"
  model: "${CURSOR_MODEL:-claude-sonnet-4-6}"
  detection:
    config_file: ".cursorrules"
    directory: ".cursor/"
  skills_compatibility: "full"
  adaptation:
    skill_format: ".cursorrules"
    command_prefix: "@"
  notes: "通过 .cursorrules 映射 SKILL.md"

windsurf:
  name: "Windsurf (Codeium)"
  vendor: "Codeium"
  type: "ide"
  enabled: "${WINDSURF_ENABLED:-false}"
  model: "${WINDSURF_MODEL:-cascade}"
  detection:
    config_file: ".windsurfrules"
    directory: ".windsurf/"
  skills_compatibility: "full"
  adaptation:
    skill_format: ".windsurfrules"
  notes: "通过 .windsurfrules 映射"

# ─── Tier 2: 高兼容（核心 Skill 可用，部分需适配）───

copilot:
  name: "GitHub Copilot"
  vendor: "GitHub / Microsoft"
  type: "ide"
  enabled: "${COPILOT_ENABLED:-false}"
  model: "${COPILOT_MODEL:-gpt-4o}"
  detection:
    config_file: ".github/copilot-instructions.md"
  skills_compatibility: "partial"
  adaptation:
    skill_format: "copilot-instructions.md"
    supported_skills: ["stdd-spec", "stdd-execute", "stdd-guard", "stdd-metrics"]
  notes: "通过 copilot-instructions.md 注入规则"

aider:
  name: "Aider"
  vendor: "Open Source"
  type: "cli"
  enabled: "${AIDER_ENABLED:-false}"
  model: "${AIDER_MODEL:-gpt-4o}"
  detection:
    command: "aider --version"
    config_file: ".aider.conf.yml"
  skills_compatibility: "partial"
  adaptation:
    skill_format: "CONVENTION.md"
    supported_skills: ["stdd-spec", "stdd-execute", "stdd-commit"]
  notes: "开源 CLI，通过 CONVENTION.md 映射"

cline:
  name: "Cline"
  vendor: "Open Source"
  type: "ide"
  enabled: "${CLINE_ENABLED:-false}"
  model: "${CLINE_MODEL:-claude-sonnet-4-6}"
  detection:
    config_file: ".clinerules"
    directory: ".cline/"
  skills_compatibility: "partial"
  adaptation:
    skill_format: ".clinerules"
  notes: "VS Code 扩展，通过 .clinerules 映射"

continue_dev:
  name: "Continue.dev"
  vendor: "Continue"
  type: "ide"
  enabled: "${CONTINUE_ENABLED:-false}"
  detection:
    config_file: ".continue/config.yaml"
    directory: ".continue/"
  skills_compatibility: "partial"
  adaptation:
    skill_format: "config.yaml"
  notes: "开源 IDE 扩展，通过 config.yaml 配置"

amazon_q:
  name: "Amazon Q Developer"
  vendor: "AWS"
  type: "ide"
  enabled: "${AMAZON_Q_ENABLED:-false}"
  model: "${AMAZON_Q_MODEL:-q-developer}"
  detection:
    config_file: ".amazonq/rules"
  skills_compatibility: "partial"
  adaptation:
    skill_format: "rules"
  notes: "通过 .amazonq/rules 注入"

# ─── Tier 3: 基础兼容（仅 Constitution + Guard 规则注入）───

qwen_code:
  name: "Qwen Code (通义灵码)"
  vendor: "Alibaba"
  type: "ide"
  enabled: "${QWEN_ENABLED:-false}"
  model: "${QWEN_MODEL:-qwen-max}"
  detection:
    config_file: ".tongyi/"
  skills_compatibility: "basic"
  adaptation:
    skill_format: ".tongyi/rules"
    inject_only: ["constitution", "guard"]
  notes: "通过 .tongyi/ 注入 Constitution 规则"

